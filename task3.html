<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabEditor | Task 2</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
        .editor-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { padding: 15px 25px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 0.85rem; color: #10b981; display: flex; align-items: center; gap: 5px; }
        .status::before { content: ""; width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; }
        #editor { height: 400px; font-size: 1.1rem; }
        .toolbar-custom { padding: 10px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="header">
        <h2 style="margin:0; font-size: 1.2rem; color: #1f2937;">📝 Shared Project Document</h2>
        <div class="status" id="save-status">All changes saved</div>
    </div>
    
    <div id="editor">
        <p>Start collaborating on this document...</p>
        <p><strong>Note:</strong> Changes are synced in real-time to local storage.</p>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    // 1. Initialize Quill Editor
    var quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    const statusEl = document.getElementById('save-status');

    // 2. Auto-Save Logic (Collaborative Simulation)
    quill.on('text-change', function() {
        statusEl.innerText = "Saving...";
        statusEl.style.color = "#f59e0b"; // Orange color for saving
        
        // Save content to LocalStorage
        const content = quill.getContents();
        localStorage.setItem('collab-doc-content', JSON.stringify(content));

        setTimeout(() => {
            statusEl.innerText = "All changes saved";
            statusEl.style.color = "#10b981"; // Green color for saved
        }, 1000);
    });

    // 3. Load existing content on refresh
    window.onload = () => {
        const savedData = localStorage.getItem('collab-doc-content');
        if (savedData) {
            quill.setContents(JSON.parse(savedData));
        }
    };
</script>

</body>
</html>
