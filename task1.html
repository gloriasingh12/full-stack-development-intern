<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya's Mega Task 1 | 4-in-1 Interface</title>
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; --dark: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        
        /* Navigation Tabs */
        .tab-bar { background: var(--dark); display: flex; justify-content: center; padding: 10px; position: sticky; top: 0; z-index: 100; }
        .tab-btn { background: none; border: 1px solid #4b5563; color: white; padding: 10px 20px; cursor: pointer; margin: 0 5px; border-radius: 5px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); border-color: var(--primary); }

        .content-section { display: none; padding: 40px 10%; animation: fadeIn 0.5s; }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Shared Styles for Components */
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="tab-bar">
    <button class="tab-btn active" onclick="openTab('quiz')">Quiz App</button>
    <button class="tab-btn" onclick="openTab('chat')">Live Chat</button>
    <button class="tab-btn" onclick="openTab('portfolio')">Portfolio</button>
    <button class="tab-btn" onclick="openTab('api')">Weather API</button>
</div>

<div id="quiz" class="content-section active">
    <div class="card">
        <h2>Brain Teaser Quiz</h2>
        <p id="q-text">Which tool is used for DAST?</p>
        <button class="btn" onclick="alert('Correct! It is OWASP ZAP')">OWASP ZAP</button>
        <button class="btn" onclick="alert('Wrong! Try again.')" style="background:#dc2626">SonarQube</button>
    </div>
</div>

<div id="chat" class="content-section">
    <div class="card" style="max-width: 400px; margin: auto;">
        <h2>Live Chat Simulator</h2>
        <div id="chat-box" style="height: 200px; border: 1px solid #ddd; margin-bottom: 10px; overflow-y: auto; padding: 10px; text-align: left;">
            <p><strong>System:</strong> Connected to Server...</p>
        </div>
        <input type="text" id="chat-input" placeholder="Say hi..." style="width:70%; padding:8px;">
        <button class="btn" onclick="sendMsg()">Send</button>
    </div>
</div>

<div id="portfolio" class="content-section">
    <div class="card">
        <h1>Aditya Tripathi</h1>
        <p>Full-Stack Developer | DevSecOps | Cloud Engineer</p>
        <div style="display: flex; justify-content: center; gap: 10px;">
            <div style="background: #eef2ff; padding: 15px; border-radius: 10px;">50+ GitHub Tasks</div>
            <div style="background: #eef2ff; padding: 15px; border-radius: 10px;">AWS Certified</div>
        </div>
    </div>
</div>

<div id="api" class="content-section">
    <div class="card">
        <h2>Noida Live Weather</h2>
        <h1 id="temp">--°C</h1>
        <p id="weather-stat">Click below to fetch live data</p>
        <button class="btn" onclick="fetchWeather()">Fetch Data</button>
    </div>
</div>

<script>
    function openTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function sendMsg() {
        const input = document.getElementById('chat-input');
        const box = document.getElementById('chat-box');
        if(input.value) {
            box.innerHTML += `<p><strong>Me:</strong> ${input.value}</p>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;
        }
    }

    async function fetchWeather() {
        const temp = document.getElementById('temp');
        temp.innerText = "⏳";
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=28.53&longitude=77.39&current_weather=true');
            const data = await res.json();
            temp.innerText = data.current_weather.temperature + "°C";
            document.getElementById('weather-stat').innerText = "Real-time data from Open-Meteo API";
        } catch(e) { temp.innerText = "Error"; }
    }
</script>

</body>
</html>
